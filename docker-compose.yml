services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-agent-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - task-agent-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-agent-worker
    restart: unless-stopped
    command: ["node", "src/workers/index.js"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - task-agent-net

  db:
    image: postgres:16-alpine
    container_name: task-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskagent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: taskagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - task-agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskagent"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  pgdata:

networks:
  task-agent-net:
    driver: bridge
