services:
  agent:
    build: .
    container_name: canopy-task-agent
    restart: unless-stopped
    env_file: .env
    ports:
      - '3100:3100'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agent-network
    volumes:
      - agent_logs:/app/logs

  db:
    image: postgres:16-alpine
    container_name: canopy-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: canopy_agent
      POSTGRES_USER: canopy_agent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - canopy_agent_db:/var/lib/postgresql/data
    networks:
      - agent-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U canopy_agent -d canopy_agent']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  agent-network:
    driver: bridge

volumes:
  canopy_agent_db:
    name: canopy_agent_db
  agent_logs:
    name: canopy_agent_logs
